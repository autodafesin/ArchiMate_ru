<!DOCTYPE html>

        <title>Специализация (специализирующая связь)</title>
    </head>
    
    <body>
        <p><b>Специализация (специализирующая связь)</b> указывает на то, что некоторый элемент является частным случаем другого элемента.</p>
        
        <h2>Категория:</h2>
        <p>Другая.</p>

        <h2>Примеры:</h2>
        <p>Процессы «Оформить выездную страховку» и «Оформить страховку багажа» представляют собой специализацию более общего процесса «Оформить страховку».</p>
    </body>
</html>
