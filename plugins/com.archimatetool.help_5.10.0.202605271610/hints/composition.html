        <title>Связь композиции</title>

    <body>
        <p><b>Связь композиции</b> означает, что один элемент состоит из одного или более других понятий.</p>
        
        <h2>Категория:</h2>
        <p>Структурная.</p>

        <h2>Примеры:</h2>
        <p>Компонент приложения может включать в себя два или более подкомпонентов.</p>
    </body>
