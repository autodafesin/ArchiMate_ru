    <body>
        <p><b>Ссылка на представление</b> — это просто ярлык на другое Представление в той же модели.</p>
        <p>Добавьте Ссылку на представление к Представлению, если хотите создать ссылку на другое Представление модели. Дважды щёлкните по ней, чтобы перейти к Представлению, на которое она ссылается.</p>
