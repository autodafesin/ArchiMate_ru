<!DOCTYPE html>

        <title>Связь передачи</title>
    </head>
    
    <body>
        <p><b>Связь передачи</b> представляет <b>передачу</b> (например, информации, товаров или денежных средств) от одного элемента другому.</p>

        <h2>Категория:</h2>
        <p>Динамическая.</p>
            
        <h2>Примеры:</h2>
        <p>«Оценка требования» передаёт решения по требованию в «Урегулирование требования» (бизнес-функция).</p>
    </body>
</html>
