<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8"/>
        <link rel="stylesheet" href="style.css" type="text/css"/>
        <title>Агрегационная связь</title>
    </head>

    <body>
        <p><b>Агрегационная связь</b> означает, что один элемент объединяет один или несколько других концептов.</p>
        
        <h2>Категория:</h2>
        <p>Структурная.</p>
       
        <h2>Примеры:</h2>
        <p>Бизнес-продукт «Страхование автомобиля» агрегирует бизнес-контракт и некоторые бизнес-услуги. «Файл клиента» агрегирует «страховой полис» и «страховое требование».</p>
    </body>
</html>
