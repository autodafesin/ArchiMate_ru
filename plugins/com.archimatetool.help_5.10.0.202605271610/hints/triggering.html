<!DOCTYPE html>

        <title>Инициирующая связь</title>
    </head>
    
    <body>
        <p> <b>Инициирующая связь</b> представляет временную или причинно-следственную связь между элементами.</p>
            
        <h2>Категория:</h2>
        <p>Динамическая.</p>

        <h2>Примеры:</h2>
        <p>Событие «Запросить страхование» инициирует ряд Бизнес-процессов: «Получить запрос» и «Обработать запрос».</p>
    </body>
</html>
