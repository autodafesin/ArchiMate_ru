        <title>Расположение</title>
    </head>
    
    <body>
        <p><b>Расположение</b> представляет собой концептуальное или физическое место либо позицию, в которой располагаются концепты (например, элементы структуры) или выполняются действия (например, элементы поведения).</p>
   	
        <h2>Категория:</h2>
        <p>Другое. Составное.</p>

        <h2>Примеры:</h2>
        <p>Главный офис, Локальный офис, Помещение.</p>
    </body>
